# Acadex Backend
server.port=8081

# Database (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/acadex?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=D@rk_life24K

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Initialization
spring.sql.init.mode=never

# JWT
app.jwt.secret=acadex-super-secret-key-that-is-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.acadex=DEBUG
logging.level.org.springframework.security=INFO

# ML risk prediction service
app.ml.risk-api.enabled=true
app.ml.risk-api.url=http://localhost:5001/predict
app.ml.risk-api.connect-timeout-ms=2000
app.ml.risk-api.read-timeout-ms=3000
app.ml.risk-api.dataset-path=../ml-risk-service/student_data.csv
