# Acadex Backend
server.port=${PORT:8081}
server.address=0.0.0.0

# Database (MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-383e7887-acadex.i.aivencloud.com:21035/defaultdb?sslMode=REQUIRED}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:avnadmin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Initialization
spring.sql.init.mode=never

# JWT
app.jwt.secret=${APP_JWT_SECRET:acadex-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}
app.cors.local-origins=${APP_CORS_LOCAL_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:5173}
app.cors.preview-origins=${APP_CORS_PREVIEW_ORIGINS:}
app.cors.production-origins=${APP_CORS_PRODUCTION_ORIGINS:https://acadex-frontend.onrender.com}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.storage.course-resources-dir=${APP_STORAGE_COURSE_RESOURCES_DIR:uploads/course-resources}
app.storage.assignment-submissions-dir=${APP_STORAGE_ASSIGNMENT_SUBMISSIONS_DIR:uploads/assignment-submissions}

# Logging
logging.level.com.acadex=${LOGGING_LEVEL_COM_ACADEX:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}

# ML risk prediction service
app.ml.risk-api.enabled=${APP_ML_RISK_API_ENABLED:false}
app.ml.risk-api.url=${APP_ML_RISK_API_URL:http://localhost:5001/predict}
app.ml.risk-api.connect-timeout-ms=${APP_ML_RISK_API_CONNECT_TIMEOUT_MS:2000}
app.ml.risk-api.read-timeout-ms=${APP_ML_RISK_API_READ_TIMEOUT_MS:3000}
app.ml.risk-api.dataset-path=${APP_ML_RISK_API_DATASET_PATH:../ml-risk-service/student_data.csv}

# ML timetable slot prediction service
app.ml.timetable-api.enabled=${APP_ML_TIMETABLE_API_ENABLED:false}
app.ml.timetable-api.url=${APP_ML_TIMETABLE_API_URL:http://localhost:5001/predict-slots}
