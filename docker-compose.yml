version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: acadex-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: D@rk_life24K
      MYSQL_DATABASE: acadex
      MYSQL_USER: acadex_user
      MYSQL_PASSWORD: acadex_pass123
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
