services:
  - type: web
    name: acadex-backend
    runtime: docker
    plan: free
    dockerContext: ./acadex-backend
    dockerfilePath: ./acadex-backend/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_CORS_PREVIEW_ORIGINS
        value: https://acadex-frontend-*.onrender.com
      - key: APP_CORS_PRODUCTION_ORIGINS
        value: https://acadex-frontend.onrender.com,https://www.acadex-frontend.onrender.com
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: APP_ML_RISK_API_ENABLED
        value: "false"
      - key: APP_ML_TIMETABLE_API_ENABLED
        value: "false"

  - type: web
    runtime: static
    name: acadex-frontend
    rootDir: acadex-react
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://acadex-backend.onrender.com/api
